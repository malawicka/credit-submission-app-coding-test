<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credit Submission App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" defer></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-2xl font-bold mb-4">Pengajuan Kredit</h1>

  <form id="form" class="bg-white p-4 rounded shadow mb-6">
    <input id="nama" type="text" placeholder="Nama Lengkap" class="border p-2 w-full mb-2" required>

    <select id="tipe" class="border p-2 w-full mb-2">
      <option>Motor</option>
      <option>Mobil</option>
      <option>Multiguna</option>
    </select>

    <input id="nominal" type="number" placeholder="Nominal" class="border p-2 w-full mb-2" required>
    <input id="tenor" type="number" placeholder="Tenor (bulan)" class="border p-2 w-full mb-2" required>
    <input id="pendapatan" type="number" placeholder="Pendapatan Bulanan" class="border p-2 w-full mb-2" required>

    <textarea id="catatan" placeholder="Catatan" class="border p-2 w-full mb-2"></textarea>

    <button class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
  </form>

  <table class="table-auto w-full bg-white shadow">
    <thead class="bg-gray-200">
      <tr>
        <th>Nama</th>
        <th>Tipe</th>
        <th>Nominal</th>
        <th>Tenor</th>
        <th>Cicilan</th>
        <th>Tanggal</th>
        <th>Status</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center">
      <h2 class="text-lg font-bold mb-2">Konfirmasi</h2>
      <p id="modalMessage" class="mb-4 text-gray-600"></p>
      

      <div class="flex justify-center gap-3">
        <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded">Batal</button>
        <button id="confirmBtn" class="px-4 py-2 bg-blue-500 text-white rounded">OK</button>
      </div>
    </div>
  </div>

</body>
</html>
